<!DOCTYPE html>
<html>
<head>
    <title>Cafetería</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
          rel="stylesheet">
</head>
<body>

<div class="container mt-4">

    {% if request.path != '/login/' %}

        <nav class="mb-3">

            <a href="/inicio/" class="btn btn-outline-primary">
                Inicio
            </a>

            <a href="/productos/" class="btn btn-outline-primary">
                Productos
            </a>

            <a href="/carrito/" class="btn btn-outline-primary">
                Carrito
            </a>

            <a href="/mis-pedidos/" class="btn btn-outline-primary">
                Mis pedidos
            </a>
            <a href="/reporte-ventas/" class="btn btn-outline-success">
            Reporte ventas
            </a>

        </nav>

        <hr>

    {% endif %}

    {% if messages %}
        {% for message in messages %}
            <div class="alert alert-{{ message.tags }}">
                {{ message }}
            </div>
        {% endfor %}
    {% endif %}

    {% block content %}
    {% endblock %}

</div>

</body>
</html>
