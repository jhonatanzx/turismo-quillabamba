{% extends 'turismo/base.html' %}

{% block title %}Mi Perfil{% endblock %}

{% block content %}
<h2><i class="bi bi-person-circle"></i> Mi Perfil</h2>

<div class="row">
    <div class="col-md-6">
        <div class="card">
            <div class="card-body">
                <form method="post">
                    {% csrf_token %}
                    {{ form.as_p }}
                    <button type="submit" class="btn btn-success w-100">Actualizar Perfil</button>
                </form>
            </div>
        </div>
    </div>
    <div class="col-md-6">
        <div class="card">
            <div class="card-body">
                <h5>Información de Usuario</h5>
                <p><strong>Usuario:</strong> {{ user.username }}</p>
                <p><strong>Email:</strong> {{ user.email }}</p>
                <p><strong>Nombre:</strong> {{ user.first_name }} {{ user.last_name }}</p>
            </div>
        </div>
    </div>
</div>
{% endblock %}
